<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akhilesh — Interactive Terminal</title>
  <meta name="description" content="Interactive terminal portfolio of Akhilesh Singh Bhadauriya — SDE at Nammayatri." />
  <meta property="og:title" content="Akhilesh's Interactive Terminal" />
  <meta property="og:description" content="Explore my portfolio through an interactive macOS-style terminal. Type help to get started!" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050a;
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(255, 46, 99, 0.05) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 100%, rgba(0, 255, 136, 0.04) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.02) 0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      padding: 24px;
      overflow: hidden;
    }

    /* Particle canvas behind terminal */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .terminal-window {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
      background: #0a0a12;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(255, 46, 99, 0.08),
        0 0 60px rgba(0, 255, 136, 0.03),
        0 0 100px rgba(0, 200, 255, 0.02);
      overflow: hidden;
      transition: box-shadow 0.5s ease;
    }
    .terminal-window:hover {
      box-shadow:
        0 30px 100px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(255, 46, 99, 0.12),
        0 0 80px rgba(0, 255, 136, 0.05),
        0 0 120px rgba(0, 200, 255, 0.04);
    }

    /* Title bar */
    .title-bar {
      background: #08080f;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      user-select: none;
    }
    .dots { display: flex; gap: 8px; }
    .dot {
      width: 13px; height: 13px; border-radius: 50%;
      transition: all 0.2s;
    }
    .dot:hover { transform: scale(1.15); }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .title-bar .title {
      flex: 1; text-align: center; color: #6e7590;
      font-size: 12px; letter-spacing: 0.5px;
    }
    .title-bar .spacer { width: 55px; }

    /* Body */
    .terminal-body {
      padding: 22px 22px 22px 28px;
      min-height: 480px;
      max-height: 75vh;
      overflow-y: auto;
      position: relative;
    }
    .terminal-body::-webkit-scrollbar { width: 4px; }
    .terminal-body::-webkit-scrollbar-track { background: transparent; }
    .terminal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }

    /* Lines */
    .line {
      margin-bottom: 1px;
      line-height: 1.7;
      font-size: 13.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .line.animated {
      opacity: 0;
      animation: lineIn 0.2s ease forwards;
    }
    @keyframes lineIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Color palette — neon cyberpunk mix */
    .p  { color: #ff2e63; }          /* prompt user — neon pink */
    .g  { color: #00ff88; }          /* prompt path — neon green */
    .c  { color: #e0e4ef; }          /* typed command */
    .o  { color: #a0a8be; }          /* output text */
    .a  { color: #00c8ff; }          /* accent — electric blue */
    .h  { color: #ff2e63; }          /* error — neon pink */
    .w  { color: #ffe156; }          /* warning — neon yellow */
    .s  { color: #00ff88; }          /* success — neon green */
    .d  { color: #6e7590; }          /* dim — clearly readable on dark bg */
    .b  { font-weight: 600; }
    .hd { color: #00c8ff; font-weight: 600; }
    .ln { color: #00c8ff; text-decoration: none; border-bottom: 1px dotted rgba(0,200,255,0.3); transition: all 0.2s; }
    .ln:hover { color: #00ff88; border-bottom-color: #00ff88; }

    /* Input */
    .input-line {
      display: flex;
      align-items: center;
      font-size: 13.5px;
      margin-top: 2px;
      min-height: 24px;
      white-space: pre;
    }
    .input-line .p, .input-line .g, .input-line .a, .input-line .d { white-space: pre; }
    .input-line input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e4ef;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      caret-color: #00ff88;
      padding: 0;
      margin: 0;
    }

    /* Fire spark particles on keystrokes */
    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      animation: sparkFade 0.6s ease-out forwards;
    }
    @keyframes sparkFade {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }

    /* Glow trail on input when typing */
    .input-line.typing {
      background: linear-gradient(90deg, rgba(255, 46, 99, 0.06) 0%, rgba(0, 255, 136, 0.03) 40%, transparent 70%);
      border-radius: 4px;
    }

    /* Vim editor */
    .vim-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      z-index: 10;
      padding: 0;
    }
    .vim-header {
      padding: 6px 16px;
      background: #12141c;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
      color: #6e7590;
      display: flex;
      justify-content: space-between;
    }
    .vim-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .vim-body textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e4ef;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 12px 16px;
      resize: none;
      tab-size: 2;
    }
    .vim-footer {
      padding: 6px 16px;
      background: #12141c;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    .vim-footer .mode { color: #00ff88; font-weight: 600; }
    .vim-footer .cmd-line {
      color: #e0e4ef;
      flex: 1;
      text-align: right;
    }
    .vim-footer .cmd-input {
      background: none;
      border: none;
      outline: none;
      color: #e0e4ef;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 120px;
      text-align: right;
    }
    .vim-line-numbers {
      position: absolute;
      left: 0;
      top: 0;
      padding: 12px 8px 12px 8px;
      text-align: right;
      color: #333750;
      font-size: 13px;
      line-height: 1.7;
      user-select: none;
      pointer-events: none;
      min-width: 36px;
    }

    /* Mobile */
    @media (max-width: 640px) {
      body { padding: 10px; }
      .terminal-body { padding: 16px; max-height: 82vh; }
      .line, .input-line, .input-line input { font-size: 12px; }
      .input-line input { font-size: 16px; }
      .terminal-window { border-radius: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="terminal-window">
    <div class="title-bar">
      <div class="dots">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>
      <span class="title">akhilesh@macbook — zsh</span>
      <span class="spacer"></span>

<script>
// ═══════════════════════════════════════
// BACKGROUND PARTICLES
// ═══════════════════════════════════════
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let dots = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

for (let i = 0; i < 40; i++) {
  dots.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    o: Math.random() * 0.15 + 0.03
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pColors = ['0,255,136', '255,46,99', '0,200,255'];
  dots.forEach((d, i) => {
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pColors[i % 3]}, ${d.o})`;
    ctx.fill();
    d.x += d.dx;
    d.y += d.dy;
    if (d.x < 0 || d.x > canvas.width) d.dx *= -1;
    if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ═══════════════════════════════════════
// FIRE SPARKS ON KEYSTROKES
// ═══════════════════════════════════════
const SPARK_COLORS = ['#ff2e63', '#00ff88', '#00c8ff', '#ffe156', '#ff2e63', '#00ff88', '#00c8ff'];

function spawnSparks(x, y) {
  const count = 4 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    const size = Math.random() * 5 + 2;
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 30 + 15;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 15; // bias upward
    const color = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];

    spark.style.cssText = `
      left: ${x}px; top: ${y}px;
      width: ${size}px; height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${size + 2}px ${color};
      --dx: ${dx}px; --dy: ${dy}px;
    `;
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 600);
  }
}

// ═══════════════════════════════════════
// VIRTUAL FILESYSTEM
// ═══════════════════════════════════════
const FS = {
  '~': {
    _type: 'dir',
    'projects': {
      _type: 'dir',
      'nammayatri': {
        _type: 'dir',
        'README.md': { _type: 'file', content: '# Nammayatri\nIndia\'s largest open-mobility platform.\nOpen source ride-hailing built with Haskell.' },
        'driver-pooling.hs': { _type: 'file', content: '-- Driver Pooling System\n-- Intelligent allocation using JSON Logic\n-- 40% efficiency improvement, 30% faster pickups\n\nmodule DriverPool where\n\nimport qualified Data.HashMap as HM\n\nallocateDriver :: Request -> IO Driver\nallocateDriver req = do\n  pool <- getAvailableDrivers req.location\n  evaluate (jsonLogicRules req) pool' },
        'gtfs-server': {
          _type: 'dir',
          'main.rs': { _type: 'file', content: '// GTFS In-Memory Server\n// O(1) lookup replacing slow GraphQL queries\n\nuse std::collections::HashMap;\n\nstruct GtfsStore {\n    routes: HashMap<String, Route>,\n    stops: HashMap<String, Stop>,\n    trips: HashMap<String, Trip>,\n}\n\nimpl GtfsStore {\n    fn query(&self, stop_id: &str) -> Option<&Stop> {\n        self.stops.get(stop_id) // O(1)\n    }\n}' },
          'Cargo.toml': { _type: 'file', content: '[package]\nname = "gtfs-inmemory-server"\nversion = "1.0.0"\nedition = "2021"\n\n[dependencies]\nactix-web = "4"\nserde = { version = "1", features = ["derive"] }\ntokio = { version = "1", features = ["full"] }' },
        },
        'drainer-service': {
          _type: 'dir',
          'Main.hs': { _type: 'file', content: '-- Event-Driven Drainer Service\n-- Fault-tolerant, 350K+ ops/hour\n\nmodule Main where\n\nimport Control.Concurrent.Async\nimport Database.Redis as R\n\nmain :: IO ()\nmain = do\n  putStrLn "Starting drainer service..."\n  conn <- R.connect defaultConnectInfo\n  forever $ drainEvents conn\n\ndrainEvents :: R.Connection -> IO ()\ndrainEvents conn = do\n  events <- R.rpop conn "event_queue"\n  mapConcurrently processEvent events' },
        },
      },
      'competitive-programming': {
        _type: 'dir',
        'codeforces': {
          _type: 'dir',
          'rating.txt': { _type: 'file', content: 'Handle: absolute_looser\nRating: Expert (Max: 1622)\nProblems Solved: 500+' },
        },
        'codechef': {
          _type: 'dir',
          'rating.txt': { _type: 'file', content: 'Rating: 5-Star (Max: 2147)\nGlobal Rank 92 in Starters 35' },
        },
        'dp_template.cpp': { _type: 'file', content: '#include <bits/stdc++.h>\nusing namespace std;\n\nint dp[100005];\n\nint solve(int n) {\n    if (n <= 1) return n;\n    if (dp[n] != -1) return dp[n];\n    return dp[n] = solve(n-1) + solve(n-2);\n}\n\nint main() {\n    memset(dp, -1, sizeof(dp));\n    int t; cin >> t;\n    while(t--) {\n        int n; cin >> n;\n        cout << solve(n) << "\\n";\n    }\n}' },
      },
    },
    'notes.txt': { _type: 'file', content: 'TODO:\n- Optimize GTFS query latency\n- Review PR #482 on shared-kernel\n- Prep for next CodeForces round\n- Write blog post on event-driven architecture' },
    '.config': {
      _type: 'dir',
      'settings.json': { _type: 'file', content: '{\n  "theme": "neon-cyberpunk",\n  "editor": "neovim",\n  "shell": "zsh",\n  "terminal": "kitty",\n  "font": "JetBrains Mono"\n}' },
    },
    'resume.txt': { _type: 'file', content: 'Akhilesh Singh Bhadauriya\nSoftware Development Engineer @ Nammayatri (Juspay)\n\nExpertise: Distributed Systems, High-Performance Computing\nLanguages: Haskell, Rust, C++, Python, JavaScript\nInfra: Redis, PostgreSQL, AWS, Docker, K8s\n\nCompetitive Programming:\n  CodeForces Expert | CodeChef 5-Star | ICPC Regionalist' },
  }
};

let cwd = '~';

function resolvePath(path) {
  if (!path) return cwd;
  let parts;
  if (path.startsWith('~')) {
    parts = ['~', ...path.slice(1).split('/').filter(Boolean)];
  } else if (path.startsWith('/')) {
    parts = ['~', ...path.slice(1).split('/').filter(Boolean)];
  } else {
    parts = [...cwd.split('/'), ...path.split('/').filter(Boolean)];
  }
  // resolve .. and .
  const resolved = [];
  for (const p of parts) {
    if (p === '..') { if (resolved.length > 1) resolved.pop(); }
    else if (p !== '.') resolved.push(p);
  }
  return resolved.join('/') || '~';
}

function getNode(path) {
  const parts = path.split('/').filter(Boolean);
  let node = null;
  for (const p of parts) {
    if (p === '~') { node = FS['~']; }
    else if (node && node[p]) { node = node[p]; }
    else { return null; }
  }
  return node;
}

function getParentAndName(path) {
  const parts = path.split('/').filter(Boolean);
  const name = parts.pop();
  const parentPath = parts.join('/') || '~';
  return { parent: getNode(parentPath), name, parentPath };
}

function shortCwd() {
  if (cwd === '~') return '~';
  return '~/' + cwd.split('/').slice(1).join('/');
}

// BASH COMMANDS
const BASH = {
  pwd: () => ['  <span class="o">' + shortCwd() + '</span>'],

  ls: (args) => {
    const target = args[0] ? resolvePath(args[0]) : cwd;
    const node = getNode(target);
    if (!node || node._type === 'file') return ['  <span class="h">ls: cannot access: No such directory</span>'];
    const entries = Object.keys(node).filter(k => k !== '_type');
    if (!entries.length) return ['  <span class="d">(empty)</span>'];
    const lines = [''];
    let row = '  ';
    entries.forEach(e => {
      const isDir = node[e]._type === 'dir';
      const display = isDir
        ? '<span class="a b">' + esc(e) + '/</span>'
        : (e.endsWith('.rs') || e.endsWith('.hs') ? '<span class="s">' + esc(e) + '</span>'
          : e.endsWith('.txt') || e.endsWith('.md') ? '<span class="w">' + esc(e) + '</span>'
          : e.endsWith('.json') || e.endsWith('.toml') ? '<span class="o">' + esc(e) + '</span>'
          : e.startsWith('.') ? '<span class="d">' + esc(e) + '</span>'
          : '<span class="c">' + esc(e) + '</span>');
      row += display + '  ';
    });
    lines.push(row);
    lines.push('');
    return lines;
  },

  cd: (args) => {
    if (!args[0] || args[0] === '~') { cwd = '~'; return []; }
    const target = resolvePath(args[0]);
    const node = getNode(target);
    if (!node) return ['  <span class="h">cd: no such directory: ' + esc(args[0]) + '</span>'];
    if (node._type === 'file') return ['  <span class="h">cd: not a directory: ' + esc(args[0]) + '</span>'];
    cwd = target;
    return [];
  },

  cat: (args) => {
    if (!args[0]) return ['  <span class="h">cat: missing file operand</span>'];
    const target = resolvePath(args[0]);
    const node = getNode(target);
    if (!node) return ['  <span class="h">cat: ' + esc(args[0]) + ': No such file</span>'];
    if (node._type === 'dir') return ['  <span class="h">cat: ' + esc(args[0]) + ': Is a directory</span>'];
    const lines = [''];
    node.content.split('\n').forEach(l => {
      lines.push('  <span class="o">' + esc(l) + '</span>');
    });
    lines.push('');
    return lines;
  },

  mkdir: (args) => {
    if (!args[0]) return ['  <span class="h">mkdir: missing operand</span>'];
    const target = resolvePath(args[0]);
    const { parent, name } = getParentAndName(target);
    if (!parent) return ['  <span class="h">mkdir: cannot create: parent not found</span>'];
    if (parent[name]) return ['  <span class="h">mkdir: ' + esc(name) + ': already exists</span>'];
    parent[name] = { _type: 'dir' };
    return [];
  },

  touch: (args) => {
    if (!args[0]) return ['  <span class="h">touch: missing operand</span>'];
    const target = resolvePath(args[0]);
    const { parent, name } = getParentAndName(target);
    if (!parent) return ['  <span class="h">touch: cannot create: parent not found</span>'];
    if (!parent[name]) parent[name] = { _type: 'file', content: '' };
    return [];
  },

  rm: (args) => {
    if (!args[0]) return ['  <span class="h">rm: missing operand</span>'];
    const flag = args[0] === '-rf' || args[0] === '-r';
    const name = flag ? args[1] : args[0];
    if (!name) return ['  <span class="h">rm: missing operand</span>'];
    const target = resolvePath(name);
    const pn = getParentAndName(target);
    if (!pn.parent || !pn.parent[pn.name]) return ['  <span class="h">rm: ' + esc(name) + ': No such file</span>'];
    if (pn.parent[pn.name]._type === 'dir' && !flag) return ['  <span class="h">rm: ' + esc(name) + ': is a directory (use -rf)</span>'];
    delete pn.parent[pn.name];
    return [];
  },

  echo: (args) => {
    const full = args.join(' ');
    // Handle echo "text" > file
    const redirect = full.match(/^(.+?)\s*>\s*(.+)$/);
    if (redirect) {
      const text = redirect[1].replace(/^["']|["']$/g, '');
      const target = resolvePath(redirect[2].trim());
      const { parent, name } = getParentAndName(target);
      if (!parent) return ['  <span class="h">echo: cannot write: parent not found</span>'];
      if (parent[name] && parent[name]._type === 'dir') return ['  <span class="h">echo: ' + esc(name) + ': Is a directory</span>'];
      parent[name] = { _type: 'file', content: text };
      return [];
    }
    // Handle echo "text" >> file (append)
    const append = full.match(/^(.+?)\s*>>\s*(.+)$/);
    if (append) {
      const text = append[1].replace(/^["']|["']$/g, '');
      const target = resolvePath(append[2].trim());
      const node = getNode(target);
      if (node && node._type === 'file') {
        node.content += '\n' + text;
      } else {
        const { parent, name } = getParentAndName(target);
        if (!parent) return ['  <span class="h">echo: cannot write: parent not found</span>'];
        parent[name] = { _type: 'file', content: text };
      }
      return [];
    }
    return ['  <span class="o">' + esc(full.replace(/^["']|["']$/g, '')) + '</span>'];
  },

  tree: (args) => {
    const target = args[0] ? resolvePath(args[0]) : cwd;
    const node = getNode(target);
    if (!node || node._type === 'file') return ['  <span class="h">tree: not a directory</span>'];
    const lines = ['', '  <span class="a b">' + esc(target.split('/').pop() || '~') + '/</span>'];
    function walk(n, prefix) {
      const entries = Object.keys(n).filter(k => k !== '_type' && k !== 'content');
      entries.forEach((e, idx) => {
        const last = idx === entries.length - 1;
        const connector = last ? '└── ' : '├── ';
        const isDir = n[e]._type === 'dir';
        if (isDir) {
          lines.push('  <span class="d">' + esc(prefix + connector) + '</span><span class="a b">' + esc(e) + '/</span>');
          walk(n[e], prefix + (last ? '    ' : '│   '));
        } else {
          lines.push('  <span class="d">' + esc(prefix + connector) + '</span><span class="o">' + esc(e) + '</span>');
        }
      });
    }
    walk(node, '');
    lines.push('');
    return lines;
  },

  hostname: () => ['  <span class="o">macbook</span>'],

    const fname = args[0];
    if (!fname) return ['  <span class="h">vim: missing filename</span>'];
    openVim(fname);
    return null; // signals: don't call run(), vim takes over
  },
  nano: (args) => BASH.vim(args),
  vi: (args) => BASH.vim(args),

  grep: (args) => {
    if (args.length < 2) return ['  <span class="h">grep: usage: grep pattern file</span>'];
    const pattern = args[0];
    const target = resolvePath(args[1]);
    const node = getNode(target);
    if (!node || node._type === 'dir') return ['  <span class="h">grep: ' + esc(args[1]) + ': No such file</span>'];
    const lines = [];
    node.content.split('\n').forEach(l => {
      if (l.toLowerCase().includes(pattern.toLowerCase())) {
        const highlighted = l.replace(new RegExp('(' + pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'),
          '<span class="h b">$1</span>');
        lines.push('  <span class="o">' + highlighted + '</span>');
      }
    });
    return lines.length ? ['', ...lines, ''] : ['  <span class="d">No matches found.</span>'];
  },

  wc: (args) => {
    if (!args[0]) return ['  <span class="h">wc: missing file</span>'];
    const target = resolvePath(args[0]);
    const node = getNode(target);
    if (!node || node._type === 'dir') return ['  <span class="h">wc: ' + esc(args[0]) + ': No such file</span>'];
    const lines = node.content.split('\n');
    const words = node.content.split(/\s+/).filter(Boolean);
    return ['  <span class="o">' + lines.length + ' lines  ' + words.length + ' words  ' + node.content.length + ' chars  ' + esc(args[0]) + '</span>'];
  },

  head: (args) => {
    if (!args[0]) return ['  <span class="h">head: missing file</span>'];
    const target = resolvePath(args[0]);
    const node = getNode(target);
    if (!node || node._type === 'dir') return ['  <span class="h">head: ' + esc(args[0]) + ': No such file</span>'];
    const lines = [''];
    node.content.split('\n').slice(0, 5).forEach(l => {
      lines.push('  <span class="o">' + esc(l) + '</span>');
    });
    lines.push('');
    return lines;
  },
};

const T = document.getElementById('t');
const history = [];
let inputEl = null;

function pr() {
  const dir = cwd === '~' ? '~' : cwd.split('/').pop();
  return '<span class="p">akhilesh</span><span class="d">@</span><span class="g">macbook</span> <span class="a">' + esc(dir) + '</span> <span class="d">%</span> ';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function scroll() { T.scrollTop = T.scrollHeight; }

function addLine(html, anim) {
  const div = document.createElement('div');
  div.className = anim ? 'line animated' : 'line';
  div.innerHTML = html || '&nbsp;';
  if (inputEl && inputEl.parentNode === T) {
    T.insertBefore(div, inputEl);
  } else {
    T.appendChild(div);
  }
  scroll();
}

function addLines(lines, cb) {
  let i = 0;
  function next() {
    if (i >= lines.length) { if (cb) cb(); return; }
    addLine(lines[i], true);
    i++;
    setTimeout(next, 25);
  }
  next();
}

function addCmd(text) {
  addLine(pr() + '<span class="c">' + esc(text) + '</span>', false);
}

function makeInput() {
  const wrap = document.createElement('div');
  wrap.className = 'input-line';
  wrap.innerHTML = pr();

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.spellcheck = false;
  inp.autocomplete = 'off';
  inp.setAttribute('aria-label', 'Terminal input');

  let hi = -1;
  let typingTimer;

  // Fire sparks on every keystroke
  inp.addEventListener('input', () => {
    const rect = inp.getBoundingClientRect();
    // Cursor position approximation
    const charW = 8.1;
    const cx = rect.left + Math.min(inp.value.length, 60) * charW;
    const cy = rect.top + rect.height / 2;
    spawnSparks(cx, cy);

    wrap.classList.add('typing');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => wrap.classList.remove('typing'), 150);
  });

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const raw = inp.value.trim();
      const cmd = raw.split(/\s+/)[0].toLowerCase();
      wrap.remove();
      inputEl = null;
      addCmd(raw || '');

      if (!cmd) { makeInput(); return; }
      if (cmd !== 'clear') history.push(raw);

      if (cmd === 'clear') {
        T.innerHTML = '';
        makeInput();
      } else if (cmd === 'ai') {
        const question = raw.substring(2).trim();
        if (!question) {
          run([
            '',
            '  <span class="hd">Usage:</span> <span class="a">ai</span> <span class="o">&lt;your question&gt;</span>',
            '',
            '  <span class="d">Examples:</span>',
            '  <span class="a">  ai</span> <span class="o">what does akhilesh do?</span>',
            '  <span class="a">  ai</span> <span class="o">what tech stack does he use?</span>',
            '  <span class="a">  ai</span> <span class="o">what is he currently working on?</span>',
            '  <span class="a">  ai</span> <span class="o">tell me about his competitive programming</span>',
            '',
          ]);
        } else {
          // AI is async — handle differently
          askAI(question).then(lines => { run(lines); });
        }
      } else if (GREET.includes(cmd)) {
        run(greet());
      } else if (CMD[cmd]) {
        run(CMD[cmd]());
      } else if (BASH[cmd]) {
        const args = raw.split(/\s+/).slice(1);
        const result = BASH[cmd](args);
        if (result === null) return; // vim takes over
        run(result);
      } else if (['apt','brew','npm','pip','pip3','yarn','pnpm','cargo','gem','go','dnf','yum','pacman','snap','flatpak','apt-get','dpkg'].includes(cmd)) {
        run([
          '',
          '  <span class="h b">Permission denied.</span>',
          '',
          '  <span class="o">Installing external packages is disabled for</span>',
          '  <span class="o">security purposes on this terminal.</span>',
          '',
          '  <span class="d">This is a sandboxed environment — no external</span>',
          '  <span class="d">tools or dependencies can be installed.</span>',
          '',
        ]);
      } else if (['install','add','uninstall','remove','upgrade','update'].includes(cmd)) {
        run([
          '',
          '  <span class="h b">Operation not permitted.</span>',
          '',
          '  <span class="o">System modifications are restricted in this</span>',
          '  <span class="o">sandboxed terminal for safety.</span>',
          '',
        ]);
      } else if (['ssh','scp','wget','curl'].includes(cmd)) {
        run([
          '',
          '  <span class="h b">Network access restricted.</span>',
          '',
          '  <span class="o">External network connections are not allowed</span>',
          '  <span class="o">in this sandboxed environment.</span>',
          '',
        ]);
      } else if (cmd === 'exit' || cmd === 'logout') {
        run([
          '',
          '  <span class="w">Goodbye! Thanks for visiting.</span>',
          '  <span class="d">Refresh the page to start a new session.</span>',
          '',
        ]);
      } else {
        addLine('<span class="h">  zsh: command not found: ' + esc(cmd) + '</span>', false);
        addLine('  <span class="d">Type</span> <span class="a">help</span> <span class="d">to see available commands.</span>', false);
        addLine('', false);
        makeInput();
      }
      hi = -1;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length) {
        if (hi === -1) hi = history.length;
        hi = Math.max(0, hi - 1);
        inp.value = history[hi];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (hi !== -1) {
        hi = Math.min(history.length, hi + 1);
        inp.value = hi === history.length ? '' : history[hi];
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const p = inp.value.trim().split(/\s+/)[0].toLowerCase();
      if (p) {
        const all = Object.keys(CMD).concat(['clear']);
        const m = all.filter(c => c.startsWith(p));
        if (m.length === 1) inp.value = m[0];
      }
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      wrap.remove();
      inputEl = null;
      addCmd(inp.value + '^C');
      makeInput();
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      T.innerHTML = '';
      wrap.remove();
      inputEl = null;
      makeInput();
    }
  });

  wrap.appendChild(inp);
  T.appendChild(wrap);
  inputEl = wrap;
  inp.focus();
  scroll();
}

function run(lines) {
  addLines(lines, () => { makeInput(); });
}

document.addEventListener('click', () => {
  const inp = T.querySelector('.input-line input');
  if (inp) inp.focus();
});

async function fetchGitHubContext() {
  try {
    const [profile, personalRepos, nyRepos, events] = await Promise.all([
      fetch('https://api.github.com/users/enigma-commits').then(r => r.json()).catch(() => null),
      fetch('https://api.github.com/users/enigma-commits/repos?sort=updated&per_page=10').then(r => r.json()).catch(() => []),
      fetch('https://api.github.com/orgs/nammayatri/repos?sort=updated&per_page=15').then(r => r.json()).catch(() => []),
      fetch('https://api.github.com/users/enigma-commits/events/public?per_page=30').then(r => r.json()).catch(() => []),
    ]);

    let ctx = '';

    if (profile) {
      ctx += `GitHub Profile: ${profile.public_repos} public repos, ${profile.followers} followers, ${profile.following} following.\n`;
    }

    if (personalRepos.length) {
      ctx += '\nPersonal Repos:\n';
      personalRepos.forEach(r => {
        ctx += `- ${r.name}: ${r.description || 'No description'} (${r.language || 'N/A'}, ${r.stargazers_count} stars)\n`;
      });
    }

    if (nyRepos.length) {
      const keyRepos = ['nammayatri', 'shared-kernel', 'namma-dsl', 'gtfs-inmemory-server-rust',
        'beckn-gateway', 'location-tracking-service', 'passetto-hs'];
      ctx += '\nNammayatri Org Repos (Akhilesh contributes to):\n';
      nyRepos.forEach(r => {
        if (keyRepos.includes(r.name) || r.stargazers_count > 5) {
          ctx += `- ${r.name}: ${r.description || 'No description'} (${r.language || 'N/A'}, ${r.stargazers_count} stars, updated ${r.updated_at?.slice(0,10)})\n`;
        }
      });
    }

    if (events.length) {
      ctx += '\nRecent GitHub Activity:\n';
      const seen = new Set();
      events.forEach(e => {
        const key = `${e.type}-${e.repo.name}`;
        if (seen.has(key)) return;
        seen.add(key);
        if (e.type === 'PushEvent') {
          const commits = e.payload.commits || [];
          const msg = commits[0]?.message?.split('\n')[0] || '';
          ctx += `- Pushed to ${e.repo.name}: "${msg}" (${e.created_at?.slice(0,10)})\n`;
        } else if (e.type === 'PullRequestEvent') {
          ctx += `- PR ${e.payload.action} in ${e.repo.name}: "${e.payload.pull_request?.title}" (${e.created_at?.slice(0,10)})\n`;
        } else if (e.type === 'CreateEvent') {
          ctx += `- Created ${e.payload.ref_type} in ${e.repo.name} (${e.created_at?.slice(0,10)})\n`;
        }
      });
    }

    githubContext = ctx;
  } catch (err) {
    githubContext = 'GitHub data unavailable.';
  }
}

// VIM EDITOR
// ═══════════════════════════════════════
function openVim(fname) {
  const target = resolvePath(fname);
  const node = getNode(target);
  const isNew = !node;
  const isDir = node && node._type === 'dir';
  if (isDir) {
    addLine('  <span class="h">vim: ' + esc(fname) + ': is a directory</span>', false);
    makeInput();
    return;
  }

  const content = node ? node.content : '';
  const body = T;

  // Create vim overlay
  const overlay = document.createElement('div');
  overlay.className = 'vim-overlay';

  const header = document.createElement('div');
  header.className = 'vim-header';
  header.innerHTML = '<span>' + esc(fname) + (isNew ? ' [New File]' : '') + '</span><span class="d">vim</span>';

  const vimBody = document.createElement('div');
  vimBody.className = 'vim-body';
  vimBody.style.position = 'relative';

  const textarea = document.createElement('textarea');
  textarea.value = content;
  textarea.spellcheck = false;
  textarea.autocomplete = 'off';
  textarea.style.paddingLeft = '44px';

  const lineNums = document.createElement('div');
  lineNums.className = 'vim-line-numbers';

  const footer = document.createElement('div');
  footer.className = 'vim-footer';

  const modeSpan = document.createElement('span');
  modeSpan.className = 'mode';
  modeSpan.textContent = '-- NORMAL --';

  const cmdSpan = document.createElement('span');
  cmdSpan.className = 'cmd-line';
  cmdSpan.textContent = '';

  footer.appendChild(modeSpan);
  footer.appendChild(cmdSpan);

  vimBody.appendChild(lineNums);
  vimBody.appendChild(textarea);
  overlay.appendChild(header);
  overlay.appendChild(vimBody);
  overlay.appendChild(footer);
  body.appendChild(overlay);

  let mode = 'normal'; // normal | insert | command
  let cmdBuffer = '';
  let modified = false;

  function updateLineNumbers() {
    const lines = textarea.value.split('\n');
    lineNums.innerHTML = lines.map((_, i) => '<span style="display:block">' + (i + 1) + '</span>').join('');
  }

  function updateFooter() {
    if (mode === 'insert') {
      modeSpan.textContent = '-- INSERT --';
      modeSpan.style.color = '#00ff88';
      cmdSpan.textContent = (modified ? '[+] ' : '') + (textarea.value.split('\n').length) + ' lines';
    } else if (mode === 'command') {
      modeSpan.textContent = '';
      cmdSpan.textContent = ':' + cmdBuffer;
    } else {
      modeSpan.textContent = '-- NORMAL --';
      modeSpan.style.color = '#00c8ff';
      cmdSpan.textContent = (modified ? '[+] ' : '') + (textarea.value.split('\n').length) + ' lines';
    }
  }

  function saveFile() {
    const { parent, name } = getParentAndName(target);
    if (parent) {
      parent[name] = { _type: 'file', content: textarea.value };
      modified = false;
      return true;
    }
    return false;
  }

  function closeVim(saved) {
    overlay.remove();
    if (saved) {
      addLine('  <span class="d">"' + esc(fname) + '" written</span>', false);
    }
    makeInput();
  }

  // Initial state
  textarea.readOnly = true;
  updateLineNumbers();
  updateFooter();
  textarea.focus();

  textarea.addEventListener('input', () => {
    modified = true;
    updateLineNumbers();
    updateFooter();
  });

  textarea.addEventListener('keydown', (e) => {
    if (mode === 'normal') {
      e.preventDefault();
      if (e.key === 'i') {
        mode = 'insert';
        textarea.readOnly = false;
        updateFooter();
      } else if (e.key === 'a') {
        mode = 'insert';
        textarea.readOnly = false;
        // move cursor forward 1
        const pos = textarea.selectionStart;
        textarea.selectionStart = textarea.selectionEnd = Math.min(pos + 1, textarea.value.length);
        updateFooter();
      } else if (e.key === 'o') {
        mode = 'insert';
        textarea.readOnly = false;
        // new line below
        const pos = textarea.selectionStart;
        const val = textarea.value;
        const lineEnd = val.indexOf('\n', pos);
        const insertAt = lineEnd === -1 ? val.length : lineEnd;
        textarea.value = val.slice(0, insertAt) + '\n' + val.slice(insertAt);
        textarea.selectionStart = textarea.selectionEnd = insertAt + 1;
        modified = true;
        updateLineNumbers();
        updateFooter();
      } else if (e.key === ':') {
        mode = 'command';
        cmdBuffer = '';
        updateFooter();
      } else if (e.key === 'G') {
        textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
      } else if (e.key === 'g') {
        textarea.selectionStart = textarea.selectionEnd = 0;
      } else if (e.key === 'j') {
        // move down — approximate
        const pos = textarea.selectionStart;
        const val = textarea.value;
        const nextNl = val.indexOf('\n', pos);
        if (nextNl !== -1) textarea.selectionStart = textarea.selectionEnd = nextNl + 1;
      } else if (e.key === 'k') {
        const pos = textarea.selectionStart;
        const val = textarea.value;
        const prevNl = val.lastIndexOf('\n', pos - 1);
        if (prevNl !== -1) textarea.selectionStart = textarea.selectionEnd = prevNl;
      } else if (e.key === 'd' && e.shiftKey === false) {
        // dd - delete line (simplified: just mark, need double press)
        // simplified: just delete current line on 'x'
      } else if (e.key === 'x') {
        const pos = textarea.selectionStart;
        const val = textarea.value;
        if (pos < val.length) {
          textarea.value = val.slice(0, pos) + val.slice(pos + 1);
          textarea.selectionStart = textarea.selectionEnd = pos;
          modified = true;
          updateLineNumbers();
          updateFooter();
        }
      }
    } else if (mode === 'insert') {
      if (e.key === 'Escape') {
        e.preventDefault();
        mode = 'normal';
        textarea.readOnly = true;
        updateFooter();
      }
      // all other keys: let textarea handle naturally
    } else if (mode === 'command') {
      e.preventDefault();
      if (e.key === 'Enter') {
        const c = cmdBuffer.trim();
        if (c === 'w') {
          saveFile();
          mode = 'normal';
          updateFooter();
        } else if (c === 'q') {
          if (modified) {
            cmdSpan.textContent = 'E37: No write since last change (add ! to override)';
            mode = 'normal';
            setTimeout(updateFooter, 1500);
          } else {
            closeVim(false);
          }
        } else if (c === 'wq' || c === 'x') {
          saveFile();
          closeVim(true);
        } else if (c === 'q!') {
          closeVim(false);
        } else {
          cmdSpan.textContent = 'E492: Not a command: ' + c;
          mode = 'normal';
          setTimeout(updateFooter, 1500);
        }
      } else if (e.key === 'Escape') {
        mode = 'normal';
        cmdBuffer = '';
        updateFooter();
      } else if (e.key === 'Backspace') {
        cmdBuffer = cmdBuffer.slice(0, -1);
        if (!cmdBuffer && !cmdBuffer.length) { mode = 'normal'; }
        updateFooter();
      } else if (e.key.length === 1) {
        cmdBuffer += e.key;
        updateFooter();
      }
    }
  });
}
