const T = document.getElementById('t');
const history = [];
let inputEl = null;

// ── Prompt ──
function pr() {
  return '<span class="p">akhilesh</span><span class="d">@</span><span class="g">macbook</span> <span class="d">~ %</span> ';
}

// ── Escape HTML ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Scroll to bottom ──
function scroll() { T.scrollTop = T.scrollHeight; }

// ── Add a single line (no animation) ──
function addLine(html, anim) {
  const div = document.createElement('div');
  div.className = anim ? 'line animated' : 'line';
  div.innerHTML = html || '&nbsp;';
  // Always insert BEFORE the input line if it exists
  if (inputEl && inputEl.parentNode === T) {
    T.insertBefore(div, inputEl);
  } else {
    T.appendChild(div);
  }
  scroll();
}

// ── Add lines with typewriter delay, then callback ──
function addLines(lines, cb) {
  let i = 0;
  function next() {
    if (i >= lines.length) {
      if (cb) cb();
      return;
    }
    addLine(lines[i], true);
    i++;
    setTimeout(next, 25);
  }
  next();
}

// ── Add command echo (no animation) ──
function addCmd(text) {
  addLine(pr() + '<span class="c">' + esc(text) + '</span>', false);
}

// ── Create input ──
function makeInput() {
  const wrap = document.createElement('div');
  wrap.className = 'input-line';
  wrap.innerHTML = pr();

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.spellcheck = false;
  inp.autocomplete = 'off';
  inp.setAttribute('aria-label', 'Terminal input');

  let hi = -1;

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const raw = inp.value.trim();
      const cmd = raw.split(/\s+/)[0].toLowerCase();
      // Remove the input line
      wrap.remove();
      inputEl = null;
      // Echo command
      addCmd(raw || '');

      if (!cmd) {
        makeInput();
        return;
      }

      if (cmd !== 'clear') history.push(raw);

      if (cmd === 'clear') {
        T.innerHTML = '';
        makeInput();
      } else if (GREET.includes(cmd)) {
        run(greet());
      } else if (CMD[cmd]) {
        const r = CMD[cmd]();
        run(r);
      } else {
        addLine('<span class="h">  zsh: command not found: ' + esc(cmd) + '</span>', false);
        addLine('  <span class="d">Type</span> <span class="a">help</span> <span class="d">to see available commands.</span>', false);
        addLine('', false);
        makeInput();
      }

      hi = -1;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length) {
        if (hi === -1) hi = history.length;
        hi = Math.max(0, hi - 1);
        inp.value = history[hi];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (hi !== -1) {
        hi = Math.min(history.length, hi + 1);
        inp.value = hi === history.length ? '' : history[hi];
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const p = inp.value.trim().split(/\s+/)[0].toLowerCase();
      if (p) {
        const all = Object.keys(CMD).concat(['clear']);
        const m = all.filter(c => c.startsWith(p));
        if (m.length === 1) inp.value = m[0];
      }
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      wrap.remove();
      inputEl = null;
      addCmd(inp.value + '^C');
      makeInput();
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      T.innerHTML = '';
      wrap.remove();
      inputEl = null;
      makeInput();
    }
  });

  wrap.appendChild(inp);
  T.appendChild(wrap);
  inputEl = wrap;
  inp.focus();
  scroll();
}

// ── Run: animate lines then show input ──
function run(lines) {
  addLines(lines, () => { makeInput(); });
}

// ── Click to focus ──
document.addEventListener('click', () => {
  const inp = T.querySelector('.input-line input');
  if (inp) inp.focus();
});
