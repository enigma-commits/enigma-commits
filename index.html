<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akhilesh — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fira Code', monospace;
      padding: 20px;
    }

    .terminal-window {
      width: 100%;
      max-width: 780px;
      background: #1a1b26;
      border-radius: 12px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 217, 255, 0.08);
      overflow: hidden;
      border: 1px solid #2a2b3d;
    }

    /* macOS title bar */
    .title-bar {
      background: #16161e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a2b3d;
      user-select: none;
    }
    .title-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red   { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .title-bar .title {
      flex: 1;
      text-align: center;
      color: #565f89;
      font-size: 13px;
      margin-right: 52px;
    }

    /* Terminal body */
    .terminal-body {
      padding: 20px;
      height: 520px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    .terminal-body::-webkit-scrollbar { width: 6px; }
    .terminal-body::-webkit-scrollbar-track { background: transparent; }
    .terminal-body::-webkit-scrollbar-thumb { background: #2a2b3d; border-radius: 3px; }

    /* Output lines */
    .line { margin-bottom: 2px; line-height: 1.6; font-size: 14px; }
    .line .prompt { color: #7aa2f7; }
    .line .path   { color: #9ece6a; }
    .line .cmd    { color: #c0caf5; }
    .line .output { color: #a9b1d6; }
    .line .accent { color: #00d9ff; }
    .line .highlight { color: #f7768e; }
    .line .warning { color: #e0af68; }
    .line .success { color: #9ece6a; }
    .line .dim { color: #565f89; }
    .line .bold { font-weight: 600; }
    .line .header {
      color: #00d9ff;
      font-weight: 600;
    }

    /* Input line */
    .input-line {
      display: flex;
      align-items: center;
      font-size: 14px;
      margin-top: 4px;
    }
    .input-line .prompt { color: #7aa2f7; white-space: pre; }
    .input-line .path { color: #9ece6a; white-space: pre; }
    .input-line input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #c0caf5;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      caret-color: #00d9ff;
    }

    /* Blinking cursor effect on focus */
    .input-line input:focus { outline: none; }

    /* Subtle glow on the window */
    .terminal-window:hover {
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 80px rgba(0, 217, 255, 0.12);
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .terminal-body { height: 70vh; padding: 14px; }
      .line, .input-line, .input-line input { font-size: 12px; }
    }
  </style>
</head>

const GREETINGS = ['hi', 'hello', 'hey', 'hola', 'sup', 'yo', 'greetings', 'howdy', 'namaste'];

// Boot sequence
const BOOT_LINES = [

function promptHTML() {
  return '<span class="prompt">akhilesh</span><span class="dim">@</span><span class="path">macbook</span> <span class="dim">~ %</span> ';
}

function addLines(lines) {
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = line || '&nbsp;';
    terminal.appendChild(div);
  });
}

function addCommandLine(cmd) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = promptHTML() + '<span class="cmd">' + escapeHTML(cmd) + '</span>';
  terminal.appendChild(div);
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function createInputLine() {
  const wrapper = document.createElement('div');
  wrapper.className = 'input-line';
  wrapper.innerHTML = promptHTML();

  const input = document.createElement('input');
  input.type = 'text';
  input.spellcheck = false;
  input.autocomplete = 'off';
  input.autofocus = true;

  // Command history
  let historyIndex = -1;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim().toLowerCase();
      wrapper.remove();
      addCommandLine(input.value.trim() || '');

      if (cmd === '') {
        // do nothing, just new prompt
      } else if (cmd === 'clear') {
        terminal.innerHTML = '';
      } else if (GREETINGS.includes(cmd)) {
        commandHistory.push(cmd);
        addLines(greetingResponse());
      } else if (COMMANDS[cmd]) {
        if (cmd !== '') commandHistory.push(cmd);
        addLines(COMMANDS[cmd]());
      } else {
        if (cmd !== '') commandHistory.push(cmd);
        addLines([
          '<span class="highlight">  zsh: command not found: ' + escapeHTML(cmd) + '</span>',
          '  <span class="dim">Type</span> <span class="accent">help</span> <span class="dim">to see available commands.</span>',
          '',
        ]);
      }

      historyIndex = -1;
      createInputLine();
      scrollToBottom();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (commandHistory.length > 0) {
        if (historyIndex === -1) historyIndex = commandHistory.length;
        historyIndex = Math.max(0, historyIndex - 1);
        input.value = commandHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex !== -1) {
        historyIndex = Math.min(commandHistory.length, historyIndex + 1);
        input.value = historyIndex === commandHistory.length ? '' : commandHistory[historyIndex];
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = input.value.trim().toLowerCase();
      const matches = Object.keys(COMMANDS).concat(['clear']).filter(c => c.startsWith(partial));
      if (matches.length === 1) input.value = matches[0];
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      terminal.innerHTML = '';
      createInputLine();
    }
  });

  wrapper.appendChild(input);
  terminal.appendChild(wrapper);
  input.focus();
}

const commandHistory = [];

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

// Click anywhere to focus input
document.addEventListener('click', () => {

  if (input) input.focus();
});

// Boot
addLines(BOOT_LINES);
